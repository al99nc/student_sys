services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/db:/app/db
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_KEYS=${AI_API_KEYS}
      - AI_MODEL=${AI_MODEL:-openai/gpt-oss-120b}
      - DATABASE_URL=sqlite:////app/db/students.db
      - UPLOAD_DIR=uploads
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
